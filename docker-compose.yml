services:
  postgres-primary:
    image: postgres:16
    container_name: postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-grafana}
      DB_O11Y_PASSWORD: ${DB_O11Y_PASSWORD}
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    # pg_stat_statements, observability tuning, and replication config
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_activity_query_size=4096
      - -c
      - "log_line_prefix=%m:%r:%u@%d:[%p]:%l:%e:%s:%v:%x:%c:%q%a:"
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=3
      - -c
      - wal_keep_size=64
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./00-create-databases.sh:/docker-entrypoint-initdb.d/00-create-databases.sh:ro
      - ./init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init-monitoring.sh:/docker-entrypoint-initdb.d/02-monitoring.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-grafana}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pdc-network-postgre

  postgres-replica:
    image: postgres:16
    container_name: postgres-replica
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres-primary
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD}
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./replica-entrypoint.sh:/replica-entrypoint.sh:ro
    ports:
      - "5433:5432"   # replica exposed on a different host port
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s   # extra time for pg_basebackup on first boot
    networks:
      - pdc-network-postgre

  grafana-alloy:
    image: grafana/alloy:latest  # Requires v1.15.0+ for database_observability.postgres
    container_name: grafana-alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=experimental
    environment:
      GCLOUD_HOSTED_METRICS_URL: ${GCLOUD_HOSTED_METRICS_URL}
      GCLOUD_HOSTED_METRICS_ID: ${GCLOUD_HOSTED_METRICS_ID}
      GCLOUD_HOSTED_LOGS_URL: ${GCLOUD_HOSTED_LOGS_URL}
      GCLOUD_HOSTED_LOGS_ID: ${GCLOUD_HOSTED_LOGS_ID}
      GCLOUD_RW_API_KEY: ${GCLOUD_RW_API_KEY}
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - ./secrets:/var/lib/alloy/secrets:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      - "12345:12345"   # Alloy UI / health endpoint
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - pdc-network-postgre

  grafana-enterprise:
    image: grafana/grafana-enterprise:latest
    container_name: grafana-enterprise
    restart: unless-stopped
    environment:
      # Admin credentials
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      # Use PostgreSQL primary as Grafana's backend database
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres-primary:5432
      GF_DATABASE_NAME: ${POSTGRES_DB:-grafana}
      GF_DATABASE_USER: ${POSTGRES_USER:-postgres}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      GF_DATABASE_SSL_MODE: disable
      # Enterprise license (leave blank to run in trial mode)
      GF_ENTERPRISE_LICENSE_TEXT: ${GF_ENTERPRISE_LICENSE_TEXT:-}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - pdc-network-postgre

  grafana-pdc-agent:
    image: grafana/pdc-agent:latest
    container_name: grafana-pdc-agent-postgres
    restart: unless-stopped
    environment:
      # From Grafana Cloud UI (Configuration Details). Do not commit real values.
      GCLOUD_PDC_SIGNING_TOKEN: ${GCLOUD_PDC_SIGNING_TOKEN}
      GCLOUD_HOSTED_GRAFANA_ID: ${GCLOUD_HOSTED_GRAFANA_ID}
      GCLOUD_PDC_CLUSTER: ${GCLOUD_PDC_CLUSTER}
    # Official Docker run: docker run --name pdc-agent grafana/pdc-agent:latest
    #   -token ${GCLOUD_PDC_SIGNING_TOKEN} -cluster ${GCLOUD_PDC_CLUSTER}
    #   -gcloud-hosted-grafana-id ${GCLOUD_HOSTED_GRAFANA_ID}
    command:
      - -token
      - ${GCLOUD_PDC_SIGNING_TOKEN}
      - -cluster
      - ${GCLOUD_PDC_CLUSTER}
      - -gcloud-hosted-grafana-id
      - ${GCLOUD_HOSTED_GRAFANA_ID}
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - pdc-network-postgre

volumes:
  postgres_data:
  postgres_replica_data:
  alloy_data:
  grafana_data:

networks:
  pdc-network-postgre:
    driver: bridge
